on:
  release:
    types: [published, prereleased]

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "tags=ghcr.io/rhochr/serverhub:${{ github.ref_name }},ghcr.io/rhochr/serverhub:edge" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/rhochr/serverhub:${{ github.ref_name }},ghcr.io/rhochr/serverhub:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
