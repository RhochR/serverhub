<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Display:wght@400;500;700&family=Google+Sans:wght@400;500&family=Google+Sans+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- Navigation Rail -->
<nav class="nav-rail" id="navRail">

  <!-- Rail Header: menu toggle + FAB -->
  <div class="nav-rail-header">
    <button class="nav-menu-btn" id="navMenuBtn" title="Toggle navigation">
      <span class="material-icons-round">menu</span>
    </button>
    <!-- FAB lives at top of rail per MD3 spec -->
    <button class="nav-fab" id="addServerBtn" title="Add server">
      <span class="material-icons-round nav-fab-icon">add</span>
      <span class="nav-fab-label">Add Server</span>
    </button>
  </div>

  <!-- Destination Items -->
  <div class="nav-items" id="navItems">
    <!-- dynamically filled -->
  </div>

  <!-- Rail Footer: utility actions -->
  <div class="nav-rail-footer">
    <button class="nav-util-btn" id="themeToggle" title="Toggle theme">
      <div class="nav-util-indicator">
        <span class="material-icons-round" id="themeIcon">light_mode</span>
      </div>
      <span class="nav-util-label">Theme</span>
    </button>
    <button class="nav-util-btn" id="manageCatsBtn" title="Manage categories">
      <div class="nav-util-indicator">
        <span class="material-icons-round">category</span>
      </div>
      <span class="nav-util-label">Categories</span>
    </button>
  </div>

</nav>

<!-- Main Content -->
<main class="main-content" id="mainContent">
  <header class="top-bar">
    <div class="top-bar-left">
      <h1 class="page-title" id="pageTitle">All Servers</h1>
      <span class="server-count" id="serverCount">0 Servers</span>
    </div>
    <div class="top-bar-right">
      <div class="search-bar">
        <span class="material-icons-round search-icon">search</span>
        <input type="text" id="searchInput" placeholder="Search…" autocomplete="off" />
      </div>
    </div>
  </header>

  <div class="content-area">
    <div class="server-grid" id="serverGrid">
      <!-- cards injected by JS -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <span class="material-icons-round empty-icon">dns</span>
      <p>No servers in this category.</p>
      <button class="btn-filled" onclick="openAddModal()">Add server</button>
    </div>
  </div>
</main>

<!-- Add/Edit Server Modal -->
<div class="modal-backdrop" id="serverModal">
  <div class="modal md3-dialog">
    <div class="modal-header">
      <h2 id="modalTitle">Add Server</h2>
      <button class="icon-btn" onclick="closeModal('serverModal')">
        <span class="material-icons-round">close</span>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="field-group">
        <label class="field-label">Name</label>
        <div class="text-field">
          <input type="text" id="sName" placeholder="e.g. Home Server" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">URL</label>
        <div class="text-field">
          <input type="text" id="sUrl" placeholder="https://..." />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Description</label>
        <div class="text-field">
          <input type="text" id="sDesc" placeholder="Optional" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Category</label>
        <div class="text-field select-wrap">
          <select id="sCat"></select>
          <span class="material-icons-round select-arrow">expand_more</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Icon (Material Icon Name)</label>
        <div class="text-field icon-field">
          <input type="text" id="sIcon" placeholder="dns" oninput="updateIconPreview()" />
          <span class="material-icons-round icon-preview" id="iconPreview">dns</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Color</label>
        <div class="color-picker-row">
          <div class="color-swatches" id="colorSwatches"></div>
          <input type="color" id="sColor" value="#6750A4" />
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-text" onclick="closeModal('serverModal')">Cancel</button>
      <button class="btn-filled" onclick="saveServer()">Save</button>
    </div>
  </div>
</div>

<!-- Category Manager Modal -->
<div class="modal-backdrop" id="catModal">
  <div class="modal md3-dialog">
    <div class="modal-header">
      <h2>Manage Categories</h2>
      <button class="icon-btn" onclick="closeModal('catModal')">
        <span class="material-icons-round">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div id="catList" class="cat-list"></div>
      <div class="field-group" style="margin-top:20px">
        <label class="field-label">New Category</label>
        <div style="display:flex;gap:10px;align-items:center">
          <div class="text-field" style="flex:1">
            <input type="text" id="newCatName" placeholder="Name" />
          </div>
          <div class="text-field" style="width:150px">
            <input type="text" id="newCatIcon" placeholder="Icon (e.g. cloud)" />
          </div>
          <button class="btn-filled" onclick="addCategory()">
            <span class="material-icons-round">add</span>
          </button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-filled" onclick="closeModal('catModal')">Done</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal md3-dialog small-dialog">
    <div class="modal-header">
      <h2>Delete Server?</h2>
    </div>
    <div class="modal-body">
      <p id="confirmText">Are you sure you want to delete this server?</p>
    </div>
    <div class="modal-actions">
      <button class="btn-text" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn-filled danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
